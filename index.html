<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main class="containter">
    <div class="main-card">
      <h2>Your Result</h2>
      <div class="main-card__result">
        <p class="main-card__result__number">76</p>
        <p class="main-card__result__average">of 100</p>
      </div>
      <p>Great</p>
      <p>You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    <div class="summary-card">
      <h2>Summary</h2>
      <div class="summary-card__results">
        <div class="summary-card__results__1st">
          <p>Reaction</p><p>80/100</p>
        </div>
        <div class="summary-card__results__2nd">
          <p>Memory</p><p>92/200</p>
        </div>
        <div class="summary-card__results__3st">
          <p>Verbal</p><p>61/100</p>
        </div>
        <div class="summary-card__results__4rd">
          <p>Visual</p><p>73/100</p>
        </div>
      </div>
      <button>Continue</button>
    </div>
  </main>
</body>
</html>
